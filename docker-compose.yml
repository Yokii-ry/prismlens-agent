# Docker Compose 配置文件，把所有后端服务编排在一起
# 用法：docker compose up --build

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: multiprism
      POSTGRES_PASSWORD: multiprism
      POSTGRES_DB: multiprism
    ports:
      - "5432:5432"     # 把容器内的5432端口映射到本机，方便本地调试直连
    volumes:
      - postgres_data:/var/lib/postgresql/data  # 数据持久化，容器重建后数据不会丢失
    healthcheck:
      # 每5秒检查一次数据库是否就绪，其他服务等数据库就绪后才启动
      test: ["CMD-SHELL", "pg_isready -U multiprism"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 消息队列
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data  # 持久化队列数据
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI 后端
  api:
    build:
      context: ./backend    # 用 backend/ 目录下的 Dockerfile 构建镜像
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env       # 从 .env 文件读取环境变量
    environment:
      # 覆盖 .env 里的数据库地址，指向 docker-compose 网络里的 db 服务
      # 注意：容器之间通信用服务名（db/redis），不用 localhost
      DATABASE_URL: postgresql+asyncpg://multiprism:multiprism@db:5432/multiprism
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy   # 等数据库就绪后才启动
      redis:
        condition: service_healthy   # 等Redis就绪后才启动
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # ARQ Worker
  worker:
    build:
      context: ./backend    # 跟 api 用同一个镜像，但启动命令不同
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://multiprism:multiprism@db:5432/multiprism
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.worker.tasks.WorkerSettings  # Worker 的启动命令

# 持久化数据卷，容器删除后数据还在
volumes:
  postgres_data:
  redis_data: